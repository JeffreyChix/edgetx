name: Build EdgeTX WASM Modules

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Radios to build (semicolon-separated, e.g. tx16s;zorro;boxer). Leave empty for all.'
        required: false
        default: ''
  schedule:
  - cron: '0 0 * * 0' # weekly Sunday midnight

jobs:
  build-mono:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
    - name: Checkout web-simu repo
      uses: actions/checkout@v4

    - name: Checkout EdgeTX wasi-web branch
      uses: actions/checkout@v4
      with:
        repository: EdgeTX/edgetx
        ref: wasi-web
        submodules: recursive
        path: edgetx

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build python3-pip clang libclang-dev
        pip3 install Pillow lz4 libclang pydantic jinja2 typing_extensions

    - name: Build monochrome WASM modules
      run: |
        cd edgetx
        bash tools/build-wasm-modules.sh
      env:
        FLAVOR: boxer;bumblebee;commando8;gx12;mt12;pocket;t12max;t14;t20;t20v2;tpros;tprov2;tx12mk2;zorro;v12;v14;x7access;x9dp2019;x9e
        MAX_JOBS: 4
        CMAKE_GENERATOR: Ninja

    - name: Upload mono artifacts
      uses: actions/upload-artifact@v4
      with:
        name: edgetx-wasm-mono
        path: edgetx/output/*.wasm
        retention-days: 1

  build-color:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
    - name: Checkout web-simu repo
      uses: actions/checkout@v4

    - name: Checkout EdgeTX wasi-web branch
      uses: actions/checkout@v4
      with:
        repository: EdgeTX/edgetx
        ref: wasi-web
        submodules: recursive
        path: edgetx

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build python3-pip clang libclang-dev
        pip3 install Pillow lz4 libclang pydantic jinja2 typing_extensions

    - name: Build color WASM modules
      run: |
        cd edgetx
        bash tools/build-wasm-modules.sh
      env:
        FLAVOR: el18;nb4p;nv14;st16;pa01;pl18;pl18ev;pl18u;t15;t15pro;t16;t18;tx15;tx16s;tx16smk3;f16;v16;x10;x10express;x12s
        MAX_JOBS: 4
        CMAKE_GENERATOR: Ninja

    - name: Upload color artifacts
      uses: actions/upload-artifact@v4
      with:
        name: edgetx-wasm-color
        path: edgetx/output/*.wasm
        retention-days: 1

  release:
    needs: [ build-mono, build-color ]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download mono artifacts
      uses: actions/download-artifact@v4
      with:
        name: edgetx-wasm-mono
        path: wasm/

    - name: Download color artifacts
      uses: actions/download-artifact@v4
      with:
        name: edgetx-wasm-color
        path: wasm/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: wasm-latest
        name: EdgeTX WASM Simulator Modules
        body: |
          Pre-built EdgeTX WASM simulator modules.
          Built from EdgeTX wasi-web branch.
        files: wasm/*.wasm
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
