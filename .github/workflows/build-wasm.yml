name: Build EdgeTX WASM Modules

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Radios to build (semicolon-separated, e.g. tx16s;zorro;boxer). Leave empty for all.'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 0'  # weekly Sunday midnight

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout web-simu repo
        uses: actions/checkout@v4

      - name: Checkout EdgeTX wasi-web branch
        uses: actions/checkout@v4
        with:
          repository: EdgeTX/edgetx
          ref: wasi-web
          submodules: recursive
          path: edgetx

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-pip
          pip3 install Pillow lz4

      - name: Build WASM modules
        run: |
          cd edgetx
          bash tools/build-wasm-modules.sh
        env:
          FLAVOR: ${{ github.event.inputs.flavor }}
          MAX_JOBS: 4
          CMAKE_GENERATOR: Ninja

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-wasm-modules
          path: edgetx/output/*.wasm
          retention-days: 90

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wasm-latest
          name: EdgeTX WASM Simulator Modules
          body: |
            Pre-built EdgeTX WASM simulator modules.
            Built from EdgeTX wasi-web branch.
            Generated by GitHub Actions.
          files: edgetx/output/*.wasm
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
